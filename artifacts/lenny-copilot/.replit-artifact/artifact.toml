kind = "web"
previewPath = "/"
title = "Lenny's Framework Copilot"
version = "1.0.0"
id = "artifacts/lenny-copilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21705

[services.development]
run = "pnpm --filter @workspace/lenny-copilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lenny-copilot", "run", "build" ]
publicDir = "artifacts/lenny-copilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21705"
BASE_PATH = "/"
